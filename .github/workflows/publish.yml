on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.3.450

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Render Quarto Project
        run: make render

      - name: Generate PDFs with decktape
        run: |
          python -m http.server 8080 --directory docs &
          sleep 3
          for slide in introduction chap01 chap02 chap03; do
            docker run --rm --net=host -v ${{ github.workspace }}:/workspace \
              ghcr.io/astefanutti/decktape:3.15.0 \
              -s 1280x720 reveal http://localhost:8080/${slide}.html /workspace/docs/${slide}.pdf
          done
          pkill -f "http.server 8080" || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
